; Broch Signal — Phase 1 · Lesson 1.1a
; Raw-LoRa, TX-only firmware for the STM32 B-L072Z-LRWAN1 Discovery kit.
; Companion code for the post: "Getting PlatformIO talking to the Discovery kit"
;
;   Build  : pio run
;   Flash  : pio run -t upload      (onboard ST-LINK — no extra wiring)
;   Serial : pio device monitor     (115200 baud, ST-LINK virtual COM port)
;
; Versions are pinned on purpose: STM32/LoRa tutorials rot fast, and a reader
; should be able to reproduce this exactly. Bump them deliberately, not by drift.

[env:disco_l072cz_lrwan1]
platform        = ststm32@19.6.0
board           = disco_l072cz_lrwan1
framework       = arduino
upload_protocol = stlink
monitor_speed   = 115200
lib_deps =
    sandeepmistry/LoRa@0.8.0
