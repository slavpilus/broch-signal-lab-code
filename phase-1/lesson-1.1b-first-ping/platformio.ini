; Broch Signal — Phase 1 · Lesson 1.1b
; Raw-LoRa, RX-only firmware for the diymore "LoRa V4" (Heltec WiFi LoRa 32 V4
; clone: ESP32-S3 + SX1262, EU868). Listens for the Discovery kit's 1.1a beacon.
; Companion code for the post: "Two boards on 868 MHz: the Discovery kit's first ping"
;
;   Build  : pio run
;   Flash  : pio run -t upload      (native USB — hold BOOT if it won't enumerate)
;   Serial : pio device monitor     (115200 baud, native USB-CDC)
;
; Versions are pinned on purpose: ESP32/LoRa tutorials rot fast, and a reader
; should be able to reproduce this exactly. Bump them deliberately, not by drift.

[env:lora_v4]
platform      = espressif32@7.0.1        ; pinned — reproduce exactly, bump deliberately
board         = heltec_wifi_lora_32_V3   ; no V4 board id yet; V3 is pin-compatible
framework     = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1         ; Serial over the native USB port
    -D ARDUINO_USB_MODE=1
lib_deps =
    jgromes/RadioLib@7.7.0
